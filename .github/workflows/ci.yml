name: CI

on:
  push:
    branches: [main]
    tags: ["skill-v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: macos-14      # Apple-silicon runner (matches the dev machine)
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install dependencies
        run: |
          uv venv .venv --python 3.12
          uv pip install --python .venv/bin/python -r requirements.txt pytest

      - name: Run tests
        run: PYTHONDONTWRITEBYTECODE=1 .venv/bin/python -m pytest tests/ -q

      - name: Self-test (exercises the cv2-only path)
        run: .venv/bin/python -m scripts.figdatax self-test
